<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZED Soroban</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1026;
  --card:#ffffff10;
  --border:#ffffff20;
  --radius:16px;
  --accent:#00f2fe;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Tajawal',sans-serif;
  background:linear-gradient(180deg,#0b1026,#020617);
  color:#fff;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#00000070;
  backdrop-filter:blur(8px);
}
nav ul{
  display:flex;
  gap:10px;
  list-style:none;
}
nav a{color:#fff;font-size:14px}

/* HERO */
.hero{
  padding:80px 20px;
  text-align:center;
}
.hero h1{font-size:28px;margin-bottom:10px}
.hero p{opacity:.8}

/* GRID */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  text-align:center;
  transition:.2s;
}
.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:10px 14px;
  margin-top:10px;
  background:linear-gradient(135deg,#00f2fe,#4facfe);
  border-radius:10px;
  color:#000;
  font-weight:bold;
}

/* TABLE */
.table-container{
  padding:20px;
}
table{
  width:100%;
  background:#fff;
  color:#000;
  border-radius:10px;
  overflow:hidden;
}
th,td{
  padding:10px;
  text-align:center;
}
tr:hover{background:#eee}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:.7;
}

/* MOBILE OPTIMIZATION */
@media(max-width:768px){
  nav ul{display:none}
}
</style>
</head>

<body>

<nav>
  <div>ZED Soroban</div>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#download">Download</a></li>
    <li><a href="#games">Games</a></li>
  </ul>
</nav>

<section class="hero" id="home">
  <h1>زاد سوروبان</h1>
  <p>تعلم الحساب الذهني بطريقة ممتعة وسريعة</p>
</section>

<section class="cards">

  <div class="card">
    <h3>تحميل الويندوز</h3>
    <img src="pro.PNG" loading="lazy">
    <a class="btn" href="ZED SETUP.rar">Download</a>
  </div>

  <div class="card">
    <h3>تحميل الأندرويد</h3>
    <img src="tel.PNG" loading="lazy">
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.fast.zed.soroban">Google Play</a>
  </div>

</section>

<section class="table-container">
<h2>النماذج</h2>
<table>
<tr><th>العنوان</th><th>الرابط</th></tr>
<tr><td>نماذج مسابقة</td><td><a href="moja.pdf">فتح</a></td></tr>
</table>
</section>

<section class="cards" id="games">

<a class="card" href="https://zed-app.github.io/hectoc/" target="_blank">Hectoc</a>
<a class="card" href="https://zed-app.github.io/xoxo/" target="_blank">XOXO</a>
<a class="card" href="https://zed-app.github.io/sodoku/" target="_blank">Sudoku</a>

</section>

<footer>
© 2019-2026 ZED Soroban
</footer>

</body>
</html>
